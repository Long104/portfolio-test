    <!-- Low-priority audio preload — doesn't compete with critical JS bundle -->
    <link rel="preload" as="fetch" href="/far-beyond-the-stars-instrumental.opus" fetchpriority="low" />
  </head>
  <body>
    <div id="root"></div>

    <!-- ── Kick off audio fetch + decode BEFORE React loads ── -->
    <!-- Downloads 3.6MB + decodes in parallel with JS bundle parse.
         By the time the user clicks LAUNCH, the AudioBuffer is ready. -->
    <script>
      window.__AUDIO_PRELOAD__ = (async function () {
        var url = "/far-beyond-the-stars-instrumental.opus";
        try {
          var resp = await fetch(url);
          if (!resp.ok) return null;
          var arrayBuffer = await resp.arrayBuffer();

          // Try to decode immediately — AudioContext starts suspended
          // (no user gesture yet) but decodeAudioData still works.
          // AudioBuffers are portable across contexts once decoded.
          try {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var buffer = await ctx.decodeAudioData(arrayBuffer);
            ctx.close();
            return { url: url, buffer: buffer };
          } catch (e) {
            // Safari may block early AudioContext — return raw buffer for later
            return { url: url, buffer: null, arrayBuffer: arrayBuffer };
          }
        } catch (e) {
          return null;
        }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
